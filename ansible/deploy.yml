---
- name: Deploy nabokov static site to nabokov.viewflow.io
  hosts: web
  become: true
  vars:
    domain: nabokov.viewflow.io
    srv_dir: /srv/nabokov-viewflow-io
    conf_name: nabokov-viewflow-io.conf

  tasks:
    - name: Create site and letsencrypt webroot directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ srv_dir }}"
        - "{{ srv_dir }}/.letsencrypt"

    - name: Copy static site content
      ansible.builtin.copy:
        src: ../site/index.html
        dest: "{{ srv_dir }}/index.html"
        owner: root
        group: root
        mode: "0644"

    - name: Check whether TLS certificate already exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      register: cert_stat

    - name: Render nginx site config (HTTP-only until cert exists)
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ conf_name }}"
        owner: root
        group: root
        mode: "0644"
      vars:
        cert_exists: "{{ cert_stat.stat.exists }}"
      notify: Reload nginx

    - name: Enable site
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ conf_name }}"
        dest: "/etc/nginx/sites-enabled/{{ conf_name }}"
        state: link
      notify: Reload nginx

    - name: Flush handlers so HTTP vhost is live before requesting a cert
      ansible.builtin.meta: flush_handlers

    - name: Obtain TLS certificate via certbot webroot
      ansible.builtin.command:
        cmd: >
          certbot certonly --non-interactive --agree-tos
          --webroot -w {{ srv_dir }}/.letsencrypt
          -d {{ domain }}
          -m mikhail@viewflow.io
      args:
        creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      register: certbot_result

    - name: Re-render nginx site config with SSL now that the cert exists
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ conf_name }}"
        owner: root
        group: root
        mode: "0644"
      vars:
        cert_exists: true
      when: certbot_result is changed
      notify: Reload nginx

  handlers:
    - name: Reload nginx
      ansible.builtin.shell: nginx -t && systemctl reload nginx
